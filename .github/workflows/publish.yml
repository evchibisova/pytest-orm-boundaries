name: release

# On every GitHub Release: run tests, verify the built package installs and its
# pytest plugin loads, then publish to PyPI via Trusted Publishing (OIDC).
# PyPI one-time setup: Manage -> Publishing -> GitHub publisher, workflow "publish.yml".

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv run pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - run: uvx twine check dist/*   # metadata + README render sanity
      - name: Smoke-test the built wheel in a clean env
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl pytest
          /tmp/smoke/bin/pytest --help | grep -- --boundaries-config
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write   # OIDC: replaces the API token
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
