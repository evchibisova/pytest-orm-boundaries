# Aggregates for the bookshop example.
#
# Purchase references bookshop.Client and PurchaseLine references bookshop.Book
# A query that *joins through* those FKs into another aggregate
# crosses the boundary. See make_purchase.py.

[aggregates]
client   = ["bookshop.Client"]
book     = ["bookshop.Book"]
purchase = ["bookshop.Purchase", "bookshop.PurchaseLine"]
