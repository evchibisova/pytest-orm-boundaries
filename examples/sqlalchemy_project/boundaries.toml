# Aggregates for the SQLAlchemy bookshop example.
#
# SQLAlchemy has no single global model registry, so aggregates are declared by
# DB table name -- the one handle present in every statement, ORM or raw SQL.
orm = "sqlalchemy"

[aggregates]
client   = ["clients"]
book     = ["books"]
purchase = ["purchases", "purchase_lines"]

# Ignore section
# Each entry is a glob matched against the file that issues the query, relative to pytest's rootdir.
[ignore]
files = [
    "bookshop/purchases.py",  # crosses -> suppressed, tests pass
    "bookshop/catalog.py",    # clean -> reported as a stale ignore to remove
]
